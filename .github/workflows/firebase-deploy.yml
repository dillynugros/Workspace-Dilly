name: Deploy to Firebase Hosting on Merge
on:
  push:
    branches:
      - master

jobs:
  build_and_deploy:
    runs-allowed: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_WORKSPACE_DILLY }}'
          channelId: live
          projectId: workspace-dilly
