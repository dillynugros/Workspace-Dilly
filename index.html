<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Work Management Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            300: '#7dd3fc',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            800: '#075985',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        #calendar-body { grid-auto-rows: minmax(80px, 1fr); }
        .task-list-enter { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-modal { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col md:flex-row font-sans overflow-hidden">
    <div class="w-full md:w-2/3 h-full flex flex-col border-r border-slate-200 bg-white">
        <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-white shadow-sm z-10">
            <div>
                <h1 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
                    <i class="ph-fill ph-kanban text-brand-600"></i> Workspace Analis v.3.0
                </h1>
                <p class="text-sm text-slate-500">Kalender Pekerjaan Mas Dilly</p>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="changeMonth(-1)" class="p-2 hover:bg-slate-100 rounded-full"><i class="ph ph-caret-left text-xl"></i></button>
                <h2 id="current-month-display" class="text-xl font-semibold min-w-[150px] text-center">Juli 2026</h2>
                <button onclick="changeMonth(1)" class="p-2 hover:bg-slate-100 rounded-full"><i class="ph ph-caret-right text-xl"></i></button>
            </div>
        </div>

        <div class="flex-1 p-6 overflow-y-auto no-scrollbar flex flex-col">
            <div class="calendar-grid mb-2">
                <div class="text-center text-sm font-semibold text-rose-500">Min</div>
                <div class="text-center text-sm font-semibold text-slate-500">Sen</div>
                <div class="text-center text-sm font-semibold text-slate-500">Sel</div>
                <div class="text-center text-sm font-semibold text-slate-500">Rab</div>
                <div class="text-center text-sm font-semibold text-slate-500">Kam</div>
                <div class="text-center text-sm font-semibold text-slate-500">Jum</div>
                <div class="text-center text-sm font-semibold text-brand-500">Sab</div>
            </div>
            <div id="calendar-body" class="calendar-grid flex-1"></div>

            <div class="mt-6 pt-4 border-t border-slate-100">
                <h3 class="text-sm font-semibold text-slate-600 mb-3 flex items-center gap-2">
                    <i class="ph-fill ph-fire text-orange-500"></i> Intensitas Kinerja (30 Hari)
                </h3>
                <div class="flex flex-wrap gap-1.5" id="heatmap"></div>
            </div>
        </div>
    </div>

    <div class="w-full md:w-1/3 h-full bg-slate-50 flex flex-col relative">
        <div id="auth-section" class="p-6 bg-blue-50 border-b border-blue-200">
            <h3 class="text-sm font-bold text-blue-900 mb-4">🔐 Masuk dengan Google</h3>
            <div id="g_id_onload" 
                 data-client_id="691342255763-c2ehv986h2tnt71sc0c4fh7djce3pkav.apps.googleusercontent.com"
                 data-callback="handleCredentialResponse">
            </div>
            <p class="text-xs text-blue-600 mt-3">Data akan tersimpan otomatis di browser Anda</p>
        </div>

        <div id="task-form" class="p-6 bg-white border-b border-slate-200 shadow-sm z-10 hidden">
            <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                <i class="ph-fill ph-plus-circle text-brand-500"></i> Tambah Tugas
            </h3>
            <div class="space-y-3">
                <input type="text" id="task-title" placeholder="Judul Tugas..." class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all">
                <textarea id="task-desc" placeholder="Keterangan..." rows="2" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 resize-none"></textarea>
                <div class="flex gap-2">
                    <select id="task-priority" class="flex-1 p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none text-sm">
                        <option value="high">🔴 Mendesak</option>
                        <option value="medium">🟡 Penting</option>
                        <option value="low">🔵 Kasual</option>
                        <option value="routine">🟢 Rutinitas</option>
                    </select>
                    <input type="date" id="task-date" class="flex-1 p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 text-sm transition-all duration-300">
                </div>
                <button onclick="handleAddTask()" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-medium py-2.5 rounded-lg flex items-center justify-center gap-2 text-sm">
                    <i class="ph-bold ph-paper-plane-right"></i> Tambahkan
                </button>
            </div>
        </div>

        <div id="task-header" class="px-6 py-4 flex items-center justify-between hidden">
            <h3 class="font-bold text-slate-700">Daftar Tugas</h3>
        </div>

        <div id="task-list" class="flex-1 overflow-y-auto px-6 pb-6 space-y-3 no-scrollbar"></div>
    </div>

    <!-- MODALS -->
    <div id="routine-modal" class="fixed inset-0 glass-modal z-50 hidden flex items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-2xl shadow-xl w-[90%] max-w-md p-6 transform scale-95 transition-transform duration-300" id="routine-modal-content">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="ph-fill ph-arrows-clockwise text-3xl text-green-600"></i>
                </div>
                <h3 class="text-xl font-bold text-slate-800">Atur Rutinitas</h3>
            </div>
            <div class="space-y-2">
                <button onclick="saveRoutineTask('weekly')" class="w-full p-3 border border-slate-200 rounded-lg hover:bg-blue-50 text-left text-sm font-medium">
                    Setiap Minggu
                </button>
                <button onclick="saveRoutineTask('monthly')" class="w-full p-3 border border-slate-200 rounded-lg hover:bg-blue-50 text-left text-sm font-medium">
                    Setiap Bulan
                </button>
                <button onclick="saveRoutineTask('none')" class="w-full p-3 text-slate-500 text-sm font-medium">
                    Hanya Sekali
                </button>
            </div>
        </div>
    </div>

    <div id="day-modal" class="fixed inset-0 glass-modal z-50 hidden flex items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-2xl shadow-xl w-[90%] max-w-lg flex flex-col max-h-[80vh] transform scale-95 transition-transform duration-300" id="day-modal-content">
            <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="font-bold text-lg text-slate-800" id="day-modal-title">Detail Hari</h3>
                <button onclick="closeDayModal()" class="p-1 hover:bg-slate-200 rounded text-slate-500">
                    <i class="ph-bold ph-x"></i>
                </button>
            </div>
            <div class="p-4 overflow-y-auto flex-1 space-y-3" id="day-modal-tasks"></div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'workspace-dilly-tasks';
        let tasks = [];
        let realToday = new Date();
        let currentDate = new Date(realToday.getFullYear(), realToday.getMonth(), realToday.getDate());
        let pendingRoutineTask = null;
        let isLoggedIn = false;

        function handleCredentialResponse(response) {
            console.log('✅ Login berhasil!');
            isLoggedIn = true;
            updateAuthUI();
            loadTasks();
            updateDashboard();
        }

        function updateAuthUI() {
            const authSection = document.getElementById('auth-section');
            const taskForm = document.getElementById('task-form');
            const taskHeader = document.getElementById('task-header');

            if (isLoggedIn) {
                authSection.classList.add('hidden');
                taskForm.classList.remove('hidden');
                taskHeader.classList.remove('hidden');
            } else {
                authSection.classList.remove('hidden');
                taskForm.classList.add('hidden');
                taskHeader.classList.add('hidden');
            }
        }

        function loadTasks() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    tasks = JSON.parse(saved);
                } catch (e) {
                    tasks = [];
                }
            }
        }

        function saveTasks() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
        }

        window.changeMonth = (delta) => {
            currentDate.setMonth(currentDate.getMonth() + delta);
            updateDashboard();
        };

        window.handleAddTask = () => {
            const title = document.getElementById('task-title').value.trim();
            const desc = document.getElementById('task-desc').value.trim();
            const priority = document.getElementById('task-priority').value;
            const date = document.getElementById('task-date').value;

            if (!title || !date) return;

            const newTask = {
                id: Date.now(),
                title, desc, priority, date,
                completed: false,
                recurrence: 'none'
            };

            if (priority === 'routine') {
                pendingRoutineTask = newTask;
                showModal('routine-modal');
            } else {
                tasks.push(newTask);
                finishAddingTask();
            }
        };

        window.saveRoutineTask = (recurrenceType) => {
            if (!pendingRoutineTask) return;
            pendingRoutineTask.recurrence = recurrenceType;
            const baseDate = new Date(pendingRoutineTask.date);
            
            tasks.push({...pendingRoutineTask});
            
            if (recurrenceType === 'weekly') {
                for (let i = 1; i <= 52; i++) {
                    const nextDate = new Date(baseDate);
                    nextDate.setDate(nextDate.getDate() + 7 * i);
                    tasks.push({
                        ...pendingRoutineTask,
                        id: Date.now() + i,
                        date: formatDateForInput(nextDate)
                    });
                }
            } else if (recurrenceType === 'monthly') {
                for (let i = 1; i <= 12; i++) {
                    const nextDate = new Date(baseDate);
                    nextDate.setMonth(nextDate.getMonth() + i);
                    tasks.push({
                        ...pendingRoutineTask,
                        id: Date.now() + i,
                        date: formatDateForInput(nextDate)
                    });
                }
            }
            
            hideModal('routine-modal');
            pendingRoutineTask = null;
            finishAddingTask();
        };

        function finishAddingTask() {
            document.getElementById('task-title').value = '';
            document.getElementById('task-desc').value = '';
            saveTasks();
            updateDashboard();
        }

        function formatDateForInput(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function isSameDay(date1, date2) {
            return date1.getFullYear() === date2.getFullYear() &&
                   date1.getMonth() === date2.getMonth() &&
                   date1.getDate() === date2.getDate();
        }

        function getPriorityConfig(priority) {
            const configs = {
                'high': { color: 'bg-rose-100 text-rose-700 border-rose-200', label: 'Mendesak' },
                'medium': { color: 'bg-amber-100 text-amber-700 border-amber-200', label: 'Penting' },
                'low': { color: 'bg-blue-100 text-blue-700 border-blue-200', label: 'Kasual' },
                'routine': { color: 'bg-emerald-100 text-emerald-700 border-emerald-200', label: 'Rutinitas' }
            };
            return configs[priority] || configs['low'];
        }

        function updateDashboard() {
            renderCalendar();
            renderTasks();
            generateHeatmap();
        }

        function renderCalendar() {
            const monthDisplay = document.getElementById('current-month-display');
            const calendarBody = document.getElementById('calendar-body');
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const monthNames = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            
            monthDisplay.textContent = `${monthNames[month]} ${year}`;
            calendarBody.innerHTML = '';

            const firstDayOfMonth = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDayOfMonth; i++) {
                calendarBody.appendChild(document.createElement('div'));
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const cellDate = new Date(year, month, day);
                const cellDateStr = formatDateForInput(cellDate);
                const isToday = isSameDay(cellDate, realToday);
                const dayTasks = tasks.filter(t => t.date === cellDateStr);

                const cell = document.createElement('div');
                cell.className = `group relative rounded-lg p-2 border flex flex-col overflow-hidden transition-all shadow-sm cursor-pointer hover:shadow-md ${isToday ? 'border-brand-500 bg-brand-50' : 'border-slate-200 bg-white'}`;
                
                cell.onclick = () => {
                    const taskDateInput = document.getElementById('task-date');
                    if (taskDateInput) {
                        taskDateInput.value = cellDateStr;
                        
                        taskDateInput.classList.add('ring-2', 'ring-brand-500', 'bg-brand-50');
                        setTimeout(() => {
                            taskDateInput.classList.remove('ring-2', 'ring-brand-500', 'bg-brand-50');
                        }, 400);
                        
                        document.getElementById('task-title').focus();
                    }

                    if (dayTasks.length > 0) {
                        openDayModal(cellDateStr, dayTasks);
                    }
                };

                const dateNum = document.createElement('div');
                dateNum.className = `text-sm font-medium ${isToday ? 'text-brand-600 font-bold' : 'text-slate-600'}`;
                dateNum.textContent = day;
                cell.appendChild(dateNum);

                if (dayTasks.length > 0) {
                    const clearBtn = document.createElement('button');
                    clearBtn.className = 'absolute top-1 right-1 opacity-0 group-hover:opacity-100 transition-all duration-200 bg-white hover:bg-red-50 text-red-500 border border-slate-200 hover:border-red-200 p-1 rounded-md text-xs flex items-center justify-center z-20 shadow-sm h-6 min-w-[24px]';
                    clearBtn.innerHTML = '<i class="ph ph-trash"></i>';
                    
                    let clickCount = 0;
                    let resetTimeout = null;

                    clearBtn.onclick = (e) => {
                        e.stopPropagation(); 
                        clickCount++;

                        if (clickCount === 1) {
                            clearBtn.innerHTML = '<span class="text-[9px] font-bold px-1">Yakin?</span>';
                            clearBtn.className = 'absolute top-1 right-1 opacity-100 bg-red-600 text-white p-1 rounded-md text-xs flex items-center justify-center z-20 shadow-md h-6';
                            
                            resetTimeout = setTimeout(() => {
                                clickCount = 0;
                                clearBtn.innerHTML = '<i class="ph ph-trash"></i>';
                                clearBtn.className = 'absolute top-1 right-1 opacity-0 group-hover:opacity-100 transition-all duration-200 bg-white hover:bg-red-50 text-red-500 border border-slate-200 hover:border-red-200 p-1 rounded-md text-xs flex items-center justify-center z-20 shadow-sm h-6 min-w-[24px]';
                            }, 3000);
                        } else if (clickCount === 2) {
                            clearTimeout(resetTimeout);
                            tasks = tasks.filter(t => t.date !== cellDateStr);
                            saveTasks();
                            updateDashboard();
                        }
                    };
                    cell.appendChild(clearBtn);
                }

                const taskList = document.createElement('div');
                taskList.className = 'flex-1 flex flex-col gap-1 overflow-y-auto text-[10px]';
                dayTasks.forEach(task => {
                    const conf = getPriorityConfig(task.priority);
                    const indicator = document.createElement('div');
                    indicator.className = `truncate px-1.5 py-0.5 rounded border ${conf.color} ${task.completed ? 'opacity-50 line-through' : ''}`;
                    indicator.textContent = task.title;
                    taskList.appendChild(indicator);
                });
                cell.appendChild(taskList);

                calendarBody.appendChild(cell);
            }
        }

        function renderTasks() {
            const list = document.getElementById('task-list');
            list.innerHTML = '';
            
            // --- PEMBARUAN: Menyaring tugas agar yang kadaluarsa (sebelum hari ini) tidak ditampilkan di Sidebar ---
            const todayStr = formatDateForInput(realToday);
            
            const sortedTasks = [...tasks]
                .filter(task => task.date >= todayStr)
                .sort((a, b) => {
                    if(a.completed !== b.completed) return a.completed ? 1 : -1;
                    return new Date(a.date) - new Date(b.date);
                });

            if (sortedTasks.length === 0) {
                list.innerHTML = '<div class="flex flex-col items-center justify-center h-40 text-slate-400 text-center"><i class="ph ph-coffee text-4xl mb-2"></i><p class="text-sm">Tidak ada tugas ke depan</p></div>';
                return;
            }

            sortedTasks.forEach(task => {
                const conf = getPriorityConfig(task.priority);
                const tDate = new Date(task.date);
                const dateStr = isSameDay(tDate, realToday) ? 'Hari Ini' : tDate.toLocaleDateString('id-ID', {day: 'numeric', month:'short'});

                const item = document.createElement('div');
                item.className = `task-list-enter p-3 rounded-lg border bg-white shadow-sm flex gap-2 transition-all ${task.completed ? 'opacity-60' : ''}`;
                
                const checkBtn = document.createElement('button');
                checkBtn.onclick = () => {
                    task.completed = !task.completed;
                    saveTasks();
                    updateDashboard();
                };
                checkBtn.className = `mt-0.5 w-5 h-5 shrink-0 rounded-full border-2 flex items-center justify-center text-xs transition-colors ${task.completed ? 'bg-brand-500 border-brand-500 text-white' : 'border-slate-300'}`;
                checkBtn.innerHTML = '<i class="ph-bold ph-check"></i>';

                const content = document.createElement('div');
                content.className = 'flex-1 min-w-0';
                content.innerHTML = `
                    <h4 class="font-bold text-sm ${task.completed ? 'line-through text-slate-500' : 'text-slate-800'}">${task.title}</h4>
                    ${task.desc ? `<p class="text-xs text-slate-500">${task.desc}</p>` : ''}
                    <div class="flex gap-1 items-center text-[10px] mt-1">
                        <span class="${conf.color} px-1.5 py-0.5 rounded">${conf.label}</span>
                        <span class="text-slate-500">${dateStr}</span>
                    </div>
                `;

                const delBtn = document.createElement('button');
                delBtn.onclick = () => {
                    tasks = tasks.filter(t => t.id !== task.id);
                    saveTasks();
                    updateDashboard();
                };
                delBtn.className = 'w-6 h-6 shrink-0 rounded flex items-center justify-center text-slate-400 hover:text-red-500 hover:bg-red-50 text-xs';
                delBtn.innerHTML = '<i class="ph-bold ph-trash"></i>';

                item.appendChild(checkBtn);
                item.appendChild(content);
                item.appendChild(delBtn);
                list.appendChild(item);
            });
        }

        function generateHeatmap() {
            const heatmap = document.getElementById('heatmap');
            heatmap.innerHTML = '';
            const taskCounts = {};
            tasks.forEach(task => {
                if (task.completed) taskCounts[task.date] = (taskCounts[task.date] || 0) + 1;
            });

            for (let i = 29; i >= 0; i--) {
                const d = new Date(realToday);
                d.setDate(d.getDate() - i);
                const dateStr = formatDateForInput(d);
                const count = taskCounts[dateStr] || 0;
                const block = document.createElement('div');
                block.className = 'w-3 h-3 rounded-sm';
                if (count === 0) block.classList.add('bg-slate-200');
                else if (count === 1) block.classList.add('bg-brand-300');
                else if (count === 2) block.classList.add('bg-brand-500');
                else block.classList.add('bg-brand-700');
                heatmap.appendChild(block);
            }
        }

        function showModal(id) {
            const modal = document.getElementById(id);
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.remove('opacity-0'), 10);
        }

        function hideModal(id) {
            const modal = document.getElementById(id);
            modal.classList.add('opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        window.closeDayModal = () => hideModal('day-modal');

        function openDayModal(dateStr, dayTasks) {
            const d = new Date(dateStr);
            document.getElementById('day-modal-title').textContent = d.toLocaleDateString('id-ID', {weekday: 'long', day: 'numeric', month:'long'});
            const list = document.getElementById('day-modal-tasks');
            list.innerHTML = '';
            
            dayTasks.forEach(task => {
                const conf = getPriorityConfig(task.priority);
                const item = document.createElement('div');
                
                item.className = 'p-3 rounded-lg border border-slate-200 bg-white flex flex-col gap-1 shadow-sm';
                
                const descHtml = task.desc ? `<p class="text-xs text-slate-500 mt-1">${task.desc}</p>` : '';
                
                item.innerHTML = `
                    <div class="flex items-start justify-between gap-2">
                        <strong class="text-sm leading-tight ${task.completed ? 'line-through text-slate-400' : 'text-slate-800'}">${task.title}</strong>
                        <span class="shrink-0 text-[10px] font-medium ${conf.color} rounded px-1.5 py-0.5">${conf.label}</span>
                    </div>
                    ${descHtml}
                `;
                
                list.appendChild(item);
            });
            showModal('day-modal');
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('task-date').value = formatDateForInput(realToday);
            loadTasks();
            updateDashboard();
        });

        window.addEventListener('load', () => {
            google.accounts.id.renderButton(
                document.getElementById('g_id_onload'),
                { theme: 'outline', size: 'large', text: 'signin_with' }
            );
        });

    </script>
</body>
</html>
